<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('비만 예측')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="page-shell">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-lg-5">
                <div class="mb-4">
                    <span class="feature-label mb-3">AI 예측</span>
                    <h1 class="h2 fw-bold mb-3">키와 몸무게로 비만 여부를 예측합니다</h1>
                    <p class="text-muted-strong mb-0">
                        로그인하지 않아도 사용할 수 있습니다. 입력값은 Flask AI 서버로 전달되며 예측 결과는 DB에 저장하지 않습니다.
                    </p>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="app-card form-panel bg-white p-4 p-md-5 mx-lg-auto">
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
                        예측 서버 오류
                    </div>

                    <form th:action="@{/predict}" th:object="${predictRequestDto}" method="post" class="vstack gap-3">
                        <div>
                            <label for="height" class="form-label fw-semibold">키(cm)</label>
                            <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control form-control-lg"
                                   placeholder="예: 170" th:classappend="${#fields.hasErrors('height')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{height}">키 오류</div>
                        </div>

                        <div>
                            <label for="weight" class="form-label fw-semibold">몸무게(kg)</label>
                            <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control form-control-lg"
                                   placeholder="예: 70" th:classappend="${#fields.hasErrors('weight')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{weight}">몸무게 오류</div>
                        </div>

                        <div class="d-flex gap-2 pt-2 responsive-actions">
                            <button type="submit" class="btn btn-primary btn-lg">예측하기</button>
                            <a th:href="@{/}" class="btn btn-outline-secondary btn-lg">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
