<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비만 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">비만 예측 서비스</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" href="/login">로그인</a>
            <a class="btn btn-outline-primary" href="/members/join">회원가입</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h4 mb-4">비만 여부 예측</h1>

            <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
                예측 서버 오류
            </div>

            <form th:action="@{/predict}" th:object="${predictRequestDto}" method="post" class="vstack gap-3">
                <div>
                    <label for="height" class="form-label">키(cm)</label>
                    <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control"
                           th:classappend="${#fields.hasErrors('height')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{height}">키 오류</div>
                </div>

                <div>
                    <label for="weight" class="form-label">몸무게(kg)</label>
                    <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control"
                           th:classappend="${#fields.hasErrors('weight')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{weight}">몸무게 오류</div>
                </div>

                <div class="d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-primary">예측하기</button>
                    <a href="/" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
