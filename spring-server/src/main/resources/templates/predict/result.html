<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예측 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">비만 예측 서비스</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" href="/login">로그인</a>
            <a class="btn btn-outline-primary" href="/members/join">회원가입</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h4 mb-4">예측 결과</h1>

            <div class="border rounded p-4 mb-4 bg-light-subtle">
                <dl class="row mb-0">
                    <dt class="col-5">키</dt>
                    <dd class="col-7" th:text="|${request.height} cm|">170 cm</dd>

                    <dt class="col-5">몸무게</dt>
                    <dd class="col-7" th:text="|${request.weight} kg|">70 kg</dd>

                    <dt class="col-5">예측 결과</dt>
                    <dd class="col-7 fw-semibold text-primary" th:text="${response.result}">정상</dd>
                </dl>
            </div>

            <div class="d-flex gap-2">
                <a href="/predict" class="btn btn-primary">다시 예측</a>
                <a href="/" class="btn btn-outline-secondary">메인으로</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
