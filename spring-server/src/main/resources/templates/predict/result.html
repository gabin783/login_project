<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('예측 결과')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="page-shell">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="app-card bg-white p-4 p-md-5">
                    <span class="feature-label mb-3">예측 완료</span>
                    <h1 class="h3 fw-bold mb-4">AI 예측 결과</h1>

                    <div class="alert alert-primary border-0 mb-4" role="alert">
                        예측 결과는 <strong th:text="${response.result}">정상</strong>입니다.
                    </div>

                    <dl class="row g-3 mb-4">
                        <dt class="col-sm-4 text-muted-strong">입력한 키</dt>
                        <dd class="col-sm-8 fw-semibold" th:text="|${request.height} cm|">170 cm</dd>

                        <dt class="col-sm-4 text-muted-strong">입력한 몸무게</dt>
                        <dd class="col-sm-8 fw-semibold" th:text="|${request.weight} kg|">70 kg</dd>

                        <dt class="col-sm-4 text-muted-strong">예측 결과</dt>
                        <dd class="col-sm-8 fw-semibold text-primary" th:text="${response.result}">정상</dd>
                    </dl>

                    <div class="d-flex gap-2 responsive-actions">
                        <a th:href="@{/predict}" class="btn btn-primary">다시 예측</a>
                        <a th:href="@{/}" class="btn btn-outline-secondary">메인으로</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
