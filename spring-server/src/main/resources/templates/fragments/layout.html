<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">비만 예측 서비스</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/}">비만 예측 서비스</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
                aria-controls="mainNavbar" aria-expanded="false" aria-label="메뉴 열기">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/predict}">AI 예측</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/questions}">게시판</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/members}">회원 목록</a>
                </li>
            </ul>

            <div class="d-flex gap-2 align-items-lg-center">
                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/login}">로그인</a>
                    <a class="btn btn-primary btn-sm" th:href="@{/members/join}">회원가입</a>
                </div>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</body>
</html>
