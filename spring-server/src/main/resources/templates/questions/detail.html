<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${question.title}">게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">비만 예측 서비스</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-secondary">로그아웃</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <article class="mb-4">
        <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
            <div>
                <h1 class="h4 mb-2" th:text="${question.title}">게시글 제목</h1>
                <p class="text-secondary mb-0">
                    <span th:text="${question.author != null ? question.author.name : '작성자 없음'}">작성자</span>
                    <span class="mx-2">|</span>
                    <span th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                </p>
            </div>
            <div class="d-flex gap-2" th:if="${canManage}">
                <a class="btn btn-outline-primary" th:href="@{/questions/{id}/edit(id=${question.id})}">수정</a>
                <form th:action="@{/questions/{id}/delete(id=${question.id})}" method="post">
                    <button type="submit" class="btn btn-outline-danger">삭제</button>
                </form>
            </div>
        </div>

        <div class="border rounded p-4 bg-light-subtle">
            <p class="mb-0" style="white-space: pre-wrap;" th:text="${question.content}">게시글 내용</p>
        </div>
    </article>

    <a class="btn btn-secondary" th:href="@{/questions}">목록</a>
</main>
</body>
</html>
