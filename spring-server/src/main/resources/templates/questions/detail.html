<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${question.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="page-shell">
    <div class="container">
        <article class="app-card bg-white p-4 p-md-5 mb-4">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-4 flex-wrap">
                <div>
                    <span class="feature-label mb-3">게시글 상세</span>
                    <h1 class="h3 fw-bold mb-3" th:text="${question.title}">게시글 제목</h1>
                    <p class="text-muted-strong mb-0">
                        <span th:text="${question.author != null ? question.author.name : '작성자 없음'}">작성자</span>
                        <span class="mx-2">|</span>
                        <span th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                    </p>
                </div>
                <div class="d-flex gap-2 responsive-actions" th:if="${canManage}">
                    <a class="btn btn-outline-primary" th:href="@{/questions/{id}/edit(id=${question.id})}">수정</a>
                    <form th:action="@{/questions/{id}/delete(id=${question.id})}" method="post">
                        <button type="submit" class="btn btn-outline-danger">삭제</button>
                    </form>
                </div>
            </div>

            <div class="question-content border-top pt-4">
                <p class="mb-0" th:text="${question.content}">게시글 내용</p>
            </div>
        </article>

        <a class="btn btn-secondary" th:href="@{/questions}">목록</a>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
