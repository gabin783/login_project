<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">비만 예측 서비스</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-secondary">로그아웃</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="h4 mb-4">게시글 수정</h1>

            <form th:action="@{/questions/{id}/edit(id=${question.id})}" th:object="${questionRequest}" method="post" class="vstack gap-3">
                <div>
                    <label for="title" class="form-label">제목</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:errors="*{title}">제목 오류</div>
                </div>

                <div>
                    <label for="content" class="form-label">내용</label>
                    <textarea id="content" th:field="*{content}" class="form-control" rows="10"
                              th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:errors="*{content}">내용 오류</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">수정</button>
                    <a class="btn btn-outline-secondary" th:href="@{/questions/{id}(id=${question.id})}">취소</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
