<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('게시글 등록')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="page-shell">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="app-card bg-white p-4 p-md-5">
                    <span class="feature-label mb-3">게시판</span>
                    <h1 class="h3 fw-bold mb-4">게시글 등록</h1>

                    <form th:action="@{/questions}" th:object="${questionRequest}" method="post" class="vstack gap-3">
                        <div>
                            <label for="title" class="form-label fw-semibold">제목</label>
                            <input type="text" id="title" th:field="*{title}" class="form-control form-control-lg"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{title}">제목 오류</div>
                        </div>

                        <div>
                            <label for="content" class="form-label fw-semibold">내용</label>
                            <textarea id="content" th:field="*{content}" class="form-control" rows="10"
                                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:errors="*{content}">내용 오류</div>
                        </div>

                        <div class="d-flex gap-2 responsive-actions">
                            <button type="submit" class="btn btn-primary">등록</button>
                            <a class="btn btn-outline-secondary" th:href="@{/questions}">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
