<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">비만 예측 서비스</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-secondary">로그아웃</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4 mb-0">게시글 목록</h1>
        <a class="btn btn-primary" th:href="@{/questions/new}">글쓰기</a>
    </div>

    <div th:if="${#lists.isEmpty(questions)}" class="alert alert-light border">
        등록된 게시글이 없습니다.
    </div>

    <div th:unless="${#lists.isEmpty(questions)}" class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr>
                <th scope="col">번호</th>
                <th scope="col">제목</th>
                <th scope="col">작성자</th>
                <th scope="col">작성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="question : ${questions}">
                <td th:text="${question.id}">1</td>
                <td>
                    <a th:href="@{/questions/{id}(id=${question.id})}" th:text="${question.title}">게시글 제목</a>
                </td>
                <td th:text="${question.author != null ? question.author.name : '작성자 없음'}">작성자</td>
                <td th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-27</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
