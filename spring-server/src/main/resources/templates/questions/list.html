<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('게시글 목록')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="page-shell">
    <div class="container">
        <div class="d-flex justify-content-between align-items-end gap-3 mb-4 flex-wrap">
            <div>
                <span class="feature-label mb-2">게시판</span>
                <h1 class="h3 fw-bold mb-1">게시글 목록</h1>
                <p class="text-muted-strong mb-0">로그인한 사용자는 글을 작성하고 본인 글을 수정할 수 있습니다.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/questions/new}">글쓰기</a>
        </div>

        <div th:if="${#lists.isEmpty(questions)}" class="app-card bg-white p-5 text-center">
            <h2 class="h5 fw-semibold mb-2">등록된 게시글이 없습니다</h2>
            <p class="text-muted-strong mb-4">첫 게시글을 작성해보세요.</p>
            <a class="btn btn-primary" th:href="@{/questions/new}">글쓰기</a>
        </div>

        <div th:unless="${#lists.isEmpty(questions)}" class="table-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th scope="col" class="text-nowrap">번호</th>
                        <th scope="col">제목</th>
                        <th scope="col" class="text-nowrap">작성자</th>
                        <th scope="col" class="text-nowrap">작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="question : ${questions}">
                        <td class="text-muted-strong" th:text="${question.id}">1</td>
                        <td>
                            <a class="fw-semibold text-decoration-none" th:href="@{/questions/{id}(id=${question.id})}" th:text="${question.title}">게시글 제목</a>
                        </td>
                        <td th:text="${question.author != null ? question.author.name : '작성자 없음'}">작성자</td>
                        <td class="text-nowrap text-muted-strong" th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-27</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
