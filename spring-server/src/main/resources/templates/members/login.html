<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('로그인')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="page-shell">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="app-card bg-white p-4 p-md-5">
                    <span class="feature-label mb-3">회원 인증</span>
                    <h1 class="h3 fw-bold mb-2">로그인</h1>
                    <p class="text-muted-strong mb-4">게시판 작성과 관리 기능을 사용하려면 로그인해주세요.</p>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        아이디 또는 비밀번호를 확인해주세요.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        로그아웃되었습니다.
                    </div>

                    <form th:action="@{/login}" method="post" class="vstack gap-3">
                        <div>
                            <label for="username" class="form-label fw-semibold">아이디</label>
                            <input type="text" id="username" name="username" class="form-control form-control-lg" required>
                        </div>

                        <div>
                            <label for="password" class="form-label fw-semibold">비밀번호</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                        </div>

                        <div class="d-flex gap-2 pt-2 responsive-actions">
                            <button type="submit" class="btn btn-primary btn-lg">로그인</button>
                            <a th:href="@{/members/join}" class="btn btn-outline-secondary btn-lg">회원가입</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
